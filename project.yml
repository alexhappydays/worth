name: Worth
options:
  bundleIdPrefix: com.YOURTEAM.worth   # CHANGE: pick your bundle id prefix (reverse-DNS, e.g. com.alexh)
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""              # CHANGE in Phase 2: your 10-char Apple Team ID
    CODE_SIGN_STYLE: Manual

targets:
  Worth:
    type: application
    platform: iOS
    sources: [Sources/Worth]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.YOURTEAM.worth
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Worth
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: WorthWidgets
        embed: true

  WorthWidgets:
    type: app-extension
    platform: iOS
    sources: [Sources/WorthWidgets]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.YOURTEAM.worth.widgets
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Worth Widgets
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
